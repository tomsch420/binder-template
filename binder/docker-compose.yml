version: '3'
services:
  binder-template:
    image: binder-template:main
    build:
      context: ../
      dockerfile: ./binder/Dockerfile
    stdin_open: true
    tty: true
    user: root
    working_dir: /home/repo
    # entrypoint: /home/jovyan/work/binder/entrypoint.sh
    command: jupyter lab --allow-root --NotebookApp.token='' --no-browser --ip=0.0.0.0
    ports:
      - 8888:8888
    environment:
      - AUTO_START_RVIZ=1
      - RVIZ_CONFIG_FILE=/home/jovyan/.rviz2/default.rviz
    volumes:
      - ../:/home/repo:rw
    # Use Host Display
    #   - /tmp/.X11-unix:/tmp/.X11-unix:rw  # X11 socket for GUI apps
